services:
  postgres:
    image: postgres:17-alpine
    container_name: digitex-postgres
    environment:
      POSTGRES_USER: digitex
      # Falls back to "digitex" for local dev; on the VPS set POSTGRES_PASSWORD
      # in .env to a strong value generated with `openssl rand -base64 24`.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-digitex}
      POSTGRES_DB: digitex
    # Bind to localhost on the VPS only — reach it from your PC via an SSH
    # tunnel (see README "Connecting from your PC"). The bot container still
    # reaches postgres over the internal docker network.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U digitex -d digitex"]
      interval: 2s
      timeout: 2s
      retries: 20
    restart: unless-stopped

  bot:
    build: .
    container_name: digitex-bot
    restart: unless-stopped
    env_file: .env
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://digitex:digitex@postgres:5432/digitex
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./seed:/app/seed

volumes:
  pgdata:
