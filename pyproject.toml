[project]
name = "tg-testing"
version = "0.1.0"
description = "Testing system of students using telegram-bot"
readme = "README.md"
requires-python = ">=3.13"
 dependencies = [
    "pillow",
    "numpy",
    "opencv-python",
    "pypdfium2",
    "torch",
    "ultralytics",
    "supervision",
    "albumentations",
    "tqdm",
    "pyyaml",
    "doxapy",
    "typer",
    "pytest",
]

[[tool.uv.index]]
name = "pytorch"
url = "https://download.pytorch.org/whl/cu124"
explicit = true

 [build-system]
 requires = ["hatchling"]
 build-backend = "hatchling.build"

 [tool.hatch.build.targets.wheel]
 packages = ["modules", "training"]

 [tool.pytest.ini_options]
 testpaths = ["tests"]
 python_files = ["test_*.py"]
 python_classes = ["Test*"]
 python_functions = ["test_*"]
