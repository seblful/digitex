[project]
name = "digitex"
version = "0.1.0"
description = "Document digitization toolkit"
readme = "README.md"
requires-python = ">=3.13"
 dependencies = [
    "pillow",
    "numpy",
    "opencv-python",
    "pypdfium2",
    "torch",
    "torchvision",
    "torchaudio",
    "ultralytics",
    "supervision",
    "albumentations",
    "tqdm",
    "pyyaml",
    "doxapy",
    "typer",
    "pytest",
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "pytesseract",
]

[[tool.uv.index]]
 name = "pytorch-cu130"
 url = "https://download.pytorch.org/whl/cu130"
 explicit = true

[tool.uv.sources]
torch = { index = "pytorch-cu130" }
torchvision = { index = "pytorch-cu130" }

 [build-system]
  requires = ["hatchling"]
  build-backend = "hatchling.build"

  [tool.hatch.build.targets.wheel]
  packages = ["src/digitex"]

 [tool.pytest.ini_options]
 testpaths = ["tests"]
 python_files = ["test_*.py"]
 python_classes = ["Test*"]
 python_functions = ["test_*"]
