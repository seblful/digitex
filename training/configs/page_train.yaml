# YOLO Training Configuration
task: segment
model: yolo26m-seg.pt
data: training/data/page/dataset/data.yaml
epochs: 200
patience: 25
batch: 4
imgsz: 640
multi_scale: 0.25
fraction: 1.0
save: true
save_period: -1
cache: false
device: -1
workers: 4
name: train
exist_ok: false
pretrained: true
optimizer: auto
verbose: true
seed: 0
deterministic: true
single_cls: false
rect: false
cos_lr: false
close_mosaic: 10
resume: false
amp: true
overlap_mask: true
mask_ratio: 1
dropout: 0.0
val: true
split: val
save_json: false
max_det: 50
half: false
plots: true
classes: null
cls_pw: 0.25

# Augmentation Settings
hsv_h: 0.3
hsv_s: 0.7
hsv_v: 0.4
degrees: 5.0
translate: 0.05
scale: 0.1
shear: 5.0
perspective: 0.0
flipud: 0.0
fliplr: 0.0
bgr: 0.0
mosaic: 0.0
mixup: 0.0
cutmix: 0.0
copy_paste: 0.0